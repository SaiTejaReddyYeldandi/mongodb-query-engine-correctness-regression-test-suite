[pytest]
# Where tests live
testpaths = tests

# Show summary of all non-passing tests, verbose, strict markers
addopts = -ra -v --strict-markers

# Custom markers let us run subsets, e.g. `pytest -m "not mongo"` for the
# fast lane that needs no Docker.
markers =
    mongo: test requires a live MongoDB container (needs Docker)
    oracle: pure-Python oracle self-test (no Docker needed)
    property: Hypothesis property-based test
    regression: golden-output regression test
